name: Dispatch Hefaia rebuild

# Al hacer push a main del repo Nixerino, dispara el workflow sync-nixerino.yml
# del repo Hefaia para que reconstruya public/nixerino/.
#
# Requiere un PAT (fine-grained) en el secret HEFAIA_DISPATCH_TOKEN con
# permisos: contents:read, metadata:read y actions:write sobre raul-filero/Hefaia.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch on Hefaia
        env:
          GH_TOKEN: ${{ secrets.HEFAIA_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Secret HEFAIA_DISPATCH_TOKEN no configurado — el sync solo correrá por cron de Hefaia."
            exit 0
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/raul-filero/Hefaia/dispatches \
            -d '{"event_type":"nixerino-rebuild"}'
